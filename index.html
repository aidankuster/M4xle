<!DOCTYPE html>
<html>
    <head>
        <title>M4XLE</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width-device-width, initial-scale=0, user-scalable=no">
        
        <!-- meta tags for embedding on discord -->
        <meta property="og:title" content="M4XLE" />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://aidankuster.github.io/M4xle/" />
        <meta property="og:image" content="https://github.com/aidankuster/M4xle/blob/main/images/m4xImage.png" />
        <meta property="og:image:type" content="image/png" />
        <meta property="og:image:width" content="603" />
        <meta property="og:image:height" content="603" />
        <meta property="og:description" content="A wordle clone built with HTML, CSS, and Javascript featuring made-up words invented by my friend, m4x " />

        <link rel="stylesheet" href="styles.css">
        <link rel="icon" type="image/png" href="images/m4xImage.png">
        <script src="scripting.js"></script>
    </head> 
    <body>
        <h1 id="title">M4XLE</h1>
        <hr>
        <br>
        <div id="columns">
            <div id="gumi-thought">
                <img src="images/gumiThought.png" alt="GUMI is thinking">
            </div>

            <div id="main-game-container">
                <div id="board">
                <!-- populated by scripting.js intitalize() function -->
                </div>
                <div id="button-container">
                <!-- populates via scripting.js once game is over -->
                </div>
                <br>
                <h1 id="answer"></h1> 
            </div>

            <div id="gumi-image">
                <img src="images/gumiWave.png" alt="GUMI is waving">
            </div>
        </div>
    </body>
</html>
