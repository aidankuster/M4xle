<!DOCTYPE html>
<html>
    <head>
        <title>M4XLE</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width-device-width, initial-scale=0, user-scalable=no">
        <link rel="stylesheet" href="styles.css">
        <link rel="icon" type="image/png" href="images/m4xImage.png">
        <script src="scripting.js"></script>
    </head> 
    <body> 
        <h1 id="title">M4XLE</h1>
        <hr>
        <br>
        <div id="columns">
            <div id="gumi-thought">
                <img src="images/gumiThought.png" alt="GUMI is thinking">
            </div>

            <div id="main-game-container">
                <div id="board">
                <!-- populated by scripting.js intitalize() function -->
                </div>
                <div id="button-container">
                <!-- populates via scripting.js once game is over -->
                </div>
                <br>
                <h1 id="answer"></h1> 
            </div>

            <div id="gumi-image">
                <img src="images/gumiWave.png" alt="GUMI is waving">
            </div>
        </div>
    </body>
</html>
